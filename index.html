<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#app{height:100%;background:#080808;font-family:'IBM Plex Mono','Courier New',monospace}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:#0a0a0a}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px}
button{cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
button:hover{opacity:.82}
input,textarea{outline:none;font-family:inherit}
a{text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{text-shadow:0 0 12px rgba(243,186,47,.4)}50%{text-shadow:0 0 26px rgba(243,186,47,.85)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes flashG{0%{background:rgba(46,213,115,.18)}100%{background:transparent}}
@keyframes flashR{0%{background:rgba(255,71,87,.18)}100%{background:transparent}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatBtn{0%,100%{box-shadow:0 4px 20px rgba(243,186,47,.5),0 0 0 0 rgba(243,186,47,0)}50%{box-shadow:0 4px 20px rgba(243,186,47,.5),0 0 0 8px rgba(243,186,47,0)}}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.fg{animation:flashG .7s ease forwards}
.fr{animation:flashR .7s ease forwards}
.row{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 1fr 1.1fr;padding:10px 16px;gap:8px;border-bottom:1px solid rgba(255,255,255,.025);cursor:pointer;transition:background .12s}
.row:hover{background:rgba(243,186,47,.03)}
.hdr-row{display:grid;grid-template-columns:2fr 1.3fr 1fr 1fr 1fr 1.1fr;padding:6px 16px;gap:8px;border-bottom:1px solid rgba(255,255,255,.04)}
.mono{font-family:'IBM Plex Mono',monospace}
.badge{border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-weight:900;flex-shrink:0;user-select:none}
.pill{padding:3px 9px;border-radius:5px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.sort-btn{padding:5px 13px;border-radius:20px;font-size:10.5px;font-family:'IBM Plex Mono',monospace}
.sort-btn.on{background:#F3BA2F;color:#000;font-weight:700}
.sort-btn:not(.on){background:rgba(255,255,255,.04);color:#555;border:1px solid rgba(255,255,255,.07)}
.tab-btn{flex:1;padding:10px 0;font-size:12px;font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;transition:all .15s}
.tab-btn.on{background:rgba(243,186,47,.06);color:#F3BA2F;border-bottom:2px solid #F3BA2F;font-weight:700}
.tab-btn:not(.on){background:transparent;color:#333;border-bottom:2px solid transparent;font-weight:400}
.chat-bubble-user{background:linear-gradient(135deg,#F3BA2F,#ff8c00);color:#000;border-radius:14px 14px 4px 14px}
.chat-bubble-bot{background:rgba(255,255,255,.05);color:#ddd;border-radius:14px 14px 14px 4px;border:1px solid rgba(243,186,47,.07)}
</style>

const KB=[
  {k:["what is bitcoin","btc","bitcoin"],a:"₿ Bitcoin (BTC) is the world's first and largest cryptocurrency, created in 2009 by the anonymous Satoshi Nakamoto.\n\n• Max supply: 21 million BTC\n• Used as a store of value — often called 'digital gold'\n• Runs on a Proof-of-Work blockchain\n• Halving every ~4 years reduces new supply\n• Most widely traded and held crypto asset globally"},
  {k:["what is ethereum","eth","ethereum"],a:"⟠ Ethereum (ETH) is a programmable blockchain that powers smart contracts and decentralized apps (dApps).\n\n• Created by Vitalik Buterin in 2015\n• Switched to Proof-of-Stake in 2022 (The Merge)\n• Home to DeFi, NFTs, and most Web3 projects\n• ETH is used to pay 'gas' fees on the network\n• Second largest crypto by market cap"},
  {k:["what is bnb","binance coin","bnb"],a:"🟡 BNB is Binance's native token with multiple use cases.\n\n• Pay trading fees on Binance (with discount)\n• Used in BNB Chain ecosystem\n• Powers BNB Smart Chain (BSC)\n• Binance burns BNB quarterly — reducing supply\n• Used for Binance Launchpad participation"},
  {k:["what is solana","sol","solana"],a:"◎ Solana (SOL) is a high-speed blockchain known for fast, cheap transactions.\n\n• Can handle 65,000+ transactions per second\n• Very low fees (fractions of a cent)\n• Uses Proof-of-History consensus\n• Home to popular NFTs and DeFi projects\n• Major competitor to Ethereum"},
  {k:["what is defi","defi","decentralized finance"],a:"🏦 DeFi (Decentralized Finance) is financial services without banks or middlemen.\n\n• Trade, lend, borrow using smart contracts\n• No accounts or ID needed — just a wallet\n• Examples: Uniswap, Aave, Compound, Curve\n• Liquidity providers earn fees and rewards\n• Risks: smart contract bugs, hacks, impermanent loss"},
  {k:["what is nft","nfts","non-fungible"],a:"🖼️ NFTs (Non-Fungible Tokens) are unique digital assets on a blockchain.\n\n• Prove ownership of digital art, music, gaming items\n• Each NFT is one-of-a-kind and cannot be copied\n• Stored on blockchains like Ethereum and Solana\n• Buy/sell on marketplaces: OpenSea, Blur, Magic Eden\n• Value is driven by rarity and community demand"},
  {k:["what is staking","staking","stake"],a:"🔒 Staking means locking your crypto to help secure a Proof-of-Stake network — and earning rewards for it.\n\n• Like earning interest on your holdings\n• Binance offers flexible and locked staking\n• Common coins to stake: ETH, SOL, ADA, BNB, DOT\n• Rewards vary from 3% to 20%+ APY\n• Risks: lock-up periods, price drops during stake"},
  {k:["what is a wallet","crypto wallet","wallet"],a:"👛 A crypto wallet stores your private keys — the passwords that prove you own your crypto.\n\n• Hot wallets: online, convenient (MetaMask, Trust Wallet)\n• Cold wallets: offline hardware (Ledger, Trezor) — safest\n• Your wallet address is like a bank account number\n• Never share your seed phrase with ANYONE\n• If you lose your seed phrase, your funds are gone forever"},
  {k:["what is binance","binance","exchange"],a:"🟡 Binance is the world's largest cryptocurrency exchange by trading volume.\n\n• Founded by Changpeng Zhao (CZ) in 2017\n• 350+ cryptocurrencies listed\n• Features: Spot, Futures, P2P, Earn, Launchpad, NFT\n• BNB Smart Chain (BSC) is their blockchain\n• Available in 100+ countries"},
  {k:["what is launchpad","launchpad","ido","ico"],a:"🚀 Binance Launchpad is a platform for new crypto token launches.\n\n• Early access to new projects before public listing\n• Participate by holding BNB\n• Token sale prices are usually lower than market\n• Research projects before participating — high risk\n• Past launches: AXS, SAND, STX, GALA and many more"},
  {k:["what is layer 2","layer 2","l2","scaling"],a:"⚡ Layer 2 (L2) solutions are built on top of existing blockchains to make them faster and cheaper.\n\n• Ethereum's L2s: Arbitrum, Optimism, Polygon\n• Transactions happen off-chain, then settled on L1\n• Reduces gas fees by up to 100x\n• Same security as the main chain\n• Growing rapidly — most new dApps launch on L2"},
  {k:["what is layer 1","layer 1","l1","blockchain"],a:"🔗 Layer 1 is the base blockchain itself — the foundation everything is built on.\n\n• Examples: Bitcoin, Ethereum, Solana, BNB Chain, Avalanche\n• Handles security, consensus and final settlement\n• Limited in speed (scalability trilemma)\n• L2s and sidechains are built on top to scale\n• Each L1 has its own native token for fees"},
  {k:["what is a smart contract","smart contract","contract"],a:"📜 Smart contracts are self-executing programs stored on a blockchain.\n\n• Run automatically when conditions are met\n• No middlemen needed — code is the law\n• Power DeFi, NFTs, DAOs, and Web3 apps\n• Written in Solidity (Ethereum) or Rust (Solana)\n• Cannot be changed once deployed — bugs are permanent"},
  {k:["what is a dao","dao","decentralized organization"],a:"🏛️ A DAO (Decentralized Autonomous Organization) is a community-governed organization.\n\n• Rules are encoded in smart contracts\n• Token holders vote on decisions\n• No CEO or central authority\n• Used by DeFi protocols, NFT projects, investment groups\n• Examples: MakerDAO, Uniswap DAO, ENS DAO"},
  {k:["what is yield farming","yield","farming","liquidity mining"],a:"🌾 Yield farming means putting your crypto to work to earn rewards.\n\n• Provide liquidity to DEX pools → earn trading fees\n• Stake LP tokens to earn bonus token rewards\n• APYs can be very high but also very risky\n• Impermanent loss is the main risk\n• Popular on: Uniswap, Curve, PancakeSwap"},
  {k:["what is impermanent loss","impermanent","il"],a:"📉 Impermanent loss happens when you provide liquidity and token prices change.\n\n• If prices move a lot, you'd have been better just holding\n• The loss is 'impermanent' — it goes away if prices return\n• More severe with volatile token pairs\n• Stablecoin pairs (USDC/USDT) have very low IL risk\n• Always calculate IL risk before adding to a pool"},
  {k:["what is a dex","dex","decentralized exchange"],a:"🔄 A DEX (Decentralized Exchange) lets you trade crypto directly from your wallet — no account needed.\n\n• No KYC, no sign-up, no custody of your funds\n• Liquidity provided by users (not the exchange)\n• Examples: Uniswap, PancakeSwap, SushiSwap, dYdX\n• You pay gas fees for every trade\n• Prices set by automated market makers (AMM)"},
  {k:["what is a bull market","bull","bull run"],a:"🐂 A bull market is when crypto prices are rising and sentiment is positive.\n\n• Driven by growing adoption, positive news, and new money\n• Bitcoin halving cycles often trigger bull runs\n• Alt coins typically rise faster than Bitcoin (alt season)\n• FOMO (fear of missing out) peaks at the top\n• Tip: Take profits along the way — don't get too greedy"},
  {k:["what is a bear market","bear","bear market"],a:"🐻 A bear market is when crypto prices fall significantly over time.\n\n• Usually a 70–90% drawdown from peak prices\n• Driven by fear, regulation news, macro events\n• Can last 1–2 years\n• Best time to accumulate quality assets\n• DCA (dollar cost averaging) is a popular bear strategy"},

function getBotResponse(input){
  const q=input.toLowerCase().trim();
  // Try to match a coin from live data
  const coinMatch=COINS.find(c=>q.includes(c.t.toLowerCase())||q.includes(c.n.toLowerCase()));
  if(coinMatch && (q.includes('price')||q.includes('worth')||q.includes('value')||q.includes('cost')||q.includes('how much')||q.includes('current'))){
    const p=prices[coinMatch.s];
    if(p){

      return `📊 Live data for ${coinMatch.n} (${coinMatch.t}):\n\n💰 Price: $${fmt(p.lastPrice)}\n${pos?'📈':'📉'} 24H Change: ${pos?'+':''}${chg.toFixed(2)}%\n📊 24H High: $${fmt(p.highPrice)}\n📉 24H Low: $${fmt(p.lowPrice)}\n💹 Volume: $${fmtVol(p.quoteVolume)}\n\nTap "${coinMatch.t}" in the Trading tab to see the full chart and order book!`;
    }

  // Check knowledge base
  for(const entry of KB){

  if(q.match(/^(hi|hello|hey|sup|yo|good)/)) return "👋 Hey! Welcome to BNex AI.\n\nI can answer any question about crypto! Try asking me:\n• What is Bitcoin?\n• What is DeFi?\n• How does staking work?\n• What is a bull market?\n• How do I trade safely?\n\nOr switch to the Trading tab to see live coin prices! 📊";
  // Fallback
  return "🤔 I don't have a specific answer for that yet, but here's what I can help with:\n\n• Explain any cryptocurrency (Bitcoin, Ethereum, BNB, etc.)\n• DeFi, NFTs, staking, wallets, seed phrases\n• Trading tips and chart indicators (RSI, MACD)\n• Binance features (Launchpad, P2P, Futures)\n• Bull/bear markets, tokenomics, Web3\n• Live price data for any coin\n\nTry rephrasing your question! 💡";
}

function fmt(n){
  const v=parseFloat(n);
  if(!v||isNaN(v))return '—';
  if(v>=10000)return v.toLocaleString('en-US',{maximumFractionDigits:2});
  if(v>=1)return v.toFixed(2);
  if(v>=0.01)return v.toFixed(4);
  if(v>=0.0001)return v.toFixed(6);
  return v.toFixed(8);
}
function fmtVol(v){
  const n=parseFloat(v);
  if(!n||isNaN(n))return '—';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toFixed(2);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function nl2br(s){return esc(s).replace(/\n/g,'<br/>');}

function badge(coin,size=38){
  const fs=Math.max(8,size*.26);
  return `<div class="badge" style="width:${size}px;height:${size}px;background:${coin.c}18;border:2px solid ${coin.c}45;font-size:${fs}px;color:${coin.c}">${coin.t.slice(0,4)}</div>`;
}

const symSet=new Set(COINS.map(c=>c.s));
function connectWS(){
  let ws;
  try{
    ws=new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
    ws.onopen=()=>{wsStatus='live';render();};
    ws.onmessage=e=>{
      try{
        const arr=JSON.parse(e.data);
        if(!Array.isArray(arr))return;
        const nf={};
        arr.forEach(t=>{
          if(!symSet.has(t.s))return;
          const np=parseFloat(t.c),op=prevP[t.s]?parseFloat(prevP[t.s].lastPrice):0;
          if(op&&np!==op)nf[t.s]=np>op?'up':'down';
          prices[t.s]={lastPrice:t.c,priceChangePercent:t.P,highPrice:t.h,lowPrice:t.l,quoteVolume:t.q,openPrice:t.o,priceChange:t.p};
          prevP[t.s]=prices[t.s];
        });
        flash=nf;render();
        setTimeout(()=>{flash={};render();},700);
      }catch(e){}
    };
    ws.onerror=()=>{wsStatus='Error';render();};
    ws.onclose=()=>{wsStatus='Reconnecting...';render();setTimeout(connectWS,3000);};
  }catch(e){wsStatus='Error';render();setTimeout(connectWS,5000);}
}
connectWS();

  const pos=chg>=0;
  const q=`Analyze ${coin.n} (${coin.t}) for me. Price: $${fmt(p.lastPrice)}, 24H change: ${chg.toFixed(2)}%, High: $${fmt(p.highPrice)}, Low: $${fmt(p.lowPrice)}, Volume: $${fmtVol(p.quoteVolume)}.`;
  botOpen=true;
  botMsgs.push({role:'user',text:q});
  botTyping=true;
  render();
  setTimeout(()=>{
    const highLow=parseFloat(p.highPrice)-parseFloat(p.lowPrice);

    const nearHigh=parseFloat(p.lastPrice)>mid;
    const momentum=Math.abs(chg)>5?'strong':Math.abs(chg)>2?'moderate':'weak';

          <span style="color:#f0f0f0;font-size:16px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:1.2px">${coin.t}/USDT</span>
          <span class="pill" style="color:${pos?'#2ed573':'#ff4757'};background:${pos?'rgba(46,213,115,.1)':'rgba(255,71,87,.1)'};font-size:11px">${pos?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</span>
        </div>
        <div style="color:#F3BA2F;font-size:24px;font-weight:900;font-family:'Bebas Neue',sans-serif;letter-spacing:1px;line-height:1.1">${p&&p.lastPrice?'$'+fmt(p.lastPrice):'Loading...'}</div>
      </div>
    </div>
    <div style="display:flex;gap:18px;align-items:center">
      <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;margin-bottom:2px">24H HIGH</div><div style="color:#2ed573;font-weight:700;font-size:12px">$${p?fmt(p.highPrice):'—'}</div></div>
      <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;margin-bottom:2px">24H LOW</div><div style="color:#ff4757;font-weight:700;font-size:12px">$${p?fmt(p.lowPrice):'—'}</div></div>
      <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;margin-bottom:2px">VOLUME</div><div style="color:#888;font-weight:700;font-size:12px">$${p?fmtVol(p.quoteVolume):'—'}</div></div>
      <div style="text-align:center"><div style="color:#2a2a2a;font-size:8.5px;margin-bottom:2px">OPEN</div><div style="color:#ccc;font-weight:700;font-size:12px">$${p?fmt(p.openPrice):'—'}</div></div>
      <button onclick="openBotAnalyze('${coin.s}')" style="padding:7px 12px;border-radius:8px;background:linear-gradient(135deg,#F3BA2F,#ff8c00);color:#000;font-weight:800;font-size:11px;font-family:'IBM Plex Mono',monospace;box-shadow:0 3px 12px rgba(243,186,47,.3)">🤖 Analyze</button>
      <button onclick="closeCoin()" style="background:rgba(255,255,255,.05);color:#777;font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid rgba(255,255,255,.07)">✕ Back</button>
    </div>
  </div>`;
}

function orderBookHTML(price){
  const all=[...book.bids,...book.asks].map(r=>parseFloat(r[1]));
  const mx=Math.max(...all,0.001);
  const askRows=[...book.asks].reverse().slice(0,8).map(r=>{
    const pct=(parseFloat(r[1])/mx)*100;
    return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 8px;position:relative;overflow:hidden;font-size:10.5px">
      <div style="position:absolute;right:0;top:0;bottom:0;width:${pct}%;background:rgba(255,71,87,.06)"></div>
      <span class="mono" style="color:#ff4757;font-weight:600;position:relative">${fmt(r[0])}</span>
      <span class="mono" style="text-align:center;color:#666;position:relative">${parseFloat(r[1]).toFixed(4)}</span>
      <span class="mono" style="text-align:right;color:#3a3a3a;position:relative">${fmtVol(parseFloat(r[0])*parseFloat(r[1]))}</span>
    </div>`;
  }).join('');
  const bidRows=book.bids.slice(0,8).map(r=>{
    const pct=(parseFloat(r[1])/mx)*100;
    return `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:3px 8px;position:relative;overflow:hidden;font-size:10.5px">
      <div style="position:absolute;right:0;top:0;bottom:0;width:${pct}%;background:rgba(46,213,115,.06)"></div>
      <span class="mono" style="color:#2ed573;font-weight:600;position:relative">${fmt(r[0])}</span>
      <span class="mono" style="text-align:center;color:#666;position:relative">${parseFloat(r[1]).toFixed(4)}</span>
      <span class="mono" style="text-align:right;color:#3a3a3a;position:relative">${fmtVol(parseFloat(r[0])*parseFloat(r[1]))}</span>
    </div>`;
  }).join('');
  return `<div style="padding:8px 8px 4px;flex-shrink:0">
    <div style="color:#2a2a2a;font-size:8.5px;letter-spacing:1.2px;margin-bottom:4px">ORDER BOOK</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 8px;margin-bottom:3px">
      <span style="color:#1e1e1e;font-size:8.5px">Price</span>
      <span style="text-align:center;color:#1e1e1e;font-size:8.5px">Amount</span>
      <span style="text-align:right;color:#1e1e1e;font-size:8.5px">Total</span>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto">
    ${askRows}
    <div style="text-align:center;padding:6px 0;margin:2px 0;background:rgba(243,186,47,.05);border-top:1px solid rgba(243,186,47,.08);border-bottom:1px solid rgba(243,186,47,.08)">
      <span style="color:#F3BA2F;font-weight:900;font-size:14px;font-family:'Bebas Neue',sans-serif;letter-spacing:1px">$${fmt(price)}</span>
      <span style="color:#333;font-size:8.5px;margin-left:5px">LAST</span>
    </div>
    ${bidRows}
  </div>`;
}

function questionsHTML(){
  const msgs=chatMsgs.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};margin-bottom:10px;animation:fadeUp .22s ease">
    ${m.role==='bot'?`<div style="width:27px;height:27px;border-radius:50%;background:linear-gradient(135deg,#F3BA2F,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#000;margin-right:8px;flex-shrink:0;margin-top:2px;font-family:'Bebas Neue',sans-serif">BN</div>`:''}
    <div class="chat-bubble-${m.role==='user'?'user':'bot'}" style="max-width:80%;padding:9px 13px;font-size:12.5px;line-height:1.65">${nl2br(m.text)}</div>
  </div>`).join('');
  const SUGG=["What is Bitcoin?","How does DeFi work?","What is staking?","How to trade safely?","What is a seed phrase?","What is Layer 2?"];
  const suggs=chatMsgs.length<=1?`<div style="margin-top:10px"><div style="color:#2a2a2a;font-size:9px;letter-spacing:2px;margin-bottom:7px">QUICK QUESTIONS</div>${SUGG.map(s=>`<button onclick="quickChat('${s}')" style="display:block;width:100%;text-align:left;padding:8px 12px;border-radius:8px;margin-bottom:5px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);color:#666;font-size:11.5px;font-family:'IBM Plex Mono',monospace">${s}</button>`).join('')}</div>`:'';
  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div id="chat-box" style="flex:1;overflow-y:auto;padding:12px">${msgs}${suggs}</div>
    <div style="padding:9px 12px 13px;border-top:1px solid rgba(243,186,47,.07);flex-shrink:0">
      <div style="display:flex;gap:7px;align-items:flex-end">
        <textarea id="chat-in" rows="1" placeholder="Ask anything about crypto..." oninput="chatInput=this.value;this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" style="flex:1;background:rgba(255,255,255,.04);border:1px solid ${chatInput?'rgba(243,186,47,.3)':'rgba(255,255,255,.07)'};border-radius:9px;padding:9px 12px;color:#e0e0e0;font-size:13px;resize:none;line-height:1.5">${esc(chatInput)}</textarea>
        <button onclick="sendChat()" style="width:40px;height:40px;border-radius:9px;flex-shrink:0;background:${chatInput.trim()?'linear-gradient(135deg,#F3BA2F,#ff8c00)':'rgba(243,186,47,.06)'};color:${chatInput.trim()?'#000':'#333'};font-size:15px">▶</button>
      </div>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// FLOATING BOT
// ═══════════════════════════════════════════════════════════════════
function renderFloating(){
  let el=document.getElementById('floating-bot');
  if(!el){el=document.createElement('div');el.id='floating-bot';document.body.appendChild(el);}
  if(!botOpen){
    el.innerHTML=`<button onclick="setBotOpen(true)" style="position:fixed;bottom:20px;right:16px;z-index:999;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#F3BA2F,#ff8c00);font-size:22px;color:#000;animation:floatBtn 2s ease-in-out infinite">🤖</button>`;
    return;
  }
  const msgs=botMsgs.map(m=>`<div style="display:flex;justify-content:${m.role==='user'?'flex-end':'flex-start'};margin-bottom:9px">
    ${m.role==='bot'?`<div style="width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#F3BA2F,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#000;margin-right:7px;flex-shrink:0;margin-top:2px;font-family:'Bebas Neue',sans-serif">BN</div>`:''}
    <div class="chat-bubble-${m.role==='user'?'user':'bot'}" style="max-width:82%;padding:8px 12px;font-size:12px;line-height:1.6">${nl2br(m.text)}</div>
  </div>`).join('');
  const typing=botTyping?`<div style="display:flex;align-items:center;gap:7px;padding:8px 12px"><div style="display:flex;gap:4px">${[0,1,2].map(i=>`<div style="width:6px;height:6px;border-radius:50%;background:#F3BA2F;animation:typing 1.2s ease-in-out ${i*.2}s infinite"></div>`).join('')}</div><span style="color:#555;font-size:11px">Analyzing...</span></div>`:'';
  const BSUGG=["Which coin is trending up?","What's the safest coin today?","Give me a market overview","Which coin has highest volume?"];
  const suggs=botMsgs.length<=1?BSUGG.map(s=>`<button onclick="sendBotAnalysis('${s}')" style="display:block;width:100%;text-align:left;padding:7px 10px;border-radius:7px;margin-bottom:4px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05);color:#666;font-size:11px;font-family:'IBM Plex Mono',monospace">${s}</button>`).join(''):'';
  el.innerHTML=`<div style="position:fixed;bottom:12px;right:12px;z-index:999;width:min(92vw,365px);height:min(82vh,540px);background:#0d0d0d;border:1px solid rgba(243,186,47,.18);border-radius:16px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.85);animation:slideUp .25s ease;overflow:hidden">
    <div style="padding:10px 13px;border-bottom:1px solid rgba(243,186,47,.08);background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#F3BA2F,#ff8c00);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#000;font-family:'Bebas Neue',sans-serif">BN</div>
        <div><div style="color:#F3BA2F;font-size:12px;font-weight:700">BNex Analyzer</div><div style="color:#333;font-size:9px">${Object.keys(prices).length} coins live • Built-in analysis</div></div>
      </div>
      <div style="display:flex;gap:5px">
        ${botMsgs.length>1?`<button onclick="clearBot()" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);color:#444;padding:2px 8px;border-radius:5px;font-size:9px">CLEAR</button>`:''}
        <button onclick="setBotOpen(false)" style="background:none;color:#444;font-size:16px">✕</button>
      </div>
    </div>
    <div id="bot-box" style="flex:1;overflow-y:auto;padding:10px">${msgs}${typing}${suggs}</div>
    <div style="padding:7px 9px 11px;border-top:1px solid rgba(243,186,47,.06);flex-shrink:0">
      <div style="display:flex;gap:6px;align-items:flex-end">
        <textarea id="bot-in" rows="1" placeholder="Ask about the market..." oninput="botInput=this.value;this.style.height='auto';this.style.height=Math.min(this.scrollHeight,88)+'px'" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendBotAnalysis()}" style="flex:1;background:rgba(255,255,255,.04);border:1px solid ${botInput?'rgba(243,186,47,.3)':'rgba(255,255,255,.06)'};border-radius:8px;padding:8px 11px;color:#ddd;font-size:12px;resize:none;line-height:1.5">${esc(botInput)}</textarea>
        <button onclick="sendBotAnalysis()" style="width:36px;height:36px;border-radius:8px;flex-shrink:0;background:${botInput.trim()?'linear-gradient(135deg,#F3BA2F,#ff8c00)':'rgba(243,186,47,.05)'};color:${botInput.trim()?'#000':'#333'};font-size:13px">▶</button>
      </div>
    </div>
  </div>`;
  const box=document.getElementById('bot-box');
  if(box)box.scrollTop=box.scrollHeight;
}

// ═══════════════════════════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════════════════════════
function renderDetailInner(){
  const dv=document.getElementById('detail-view');
  if(!dv||!selected)return;
  const p=prices[selected.s]||{};
  dv.innerHTML=`${detailHeaderHTML(selected,p)}
  <div style="flex:1;display:flex;overflow:hidden">
    <div style="flex:1;overflow:hidden" id="tv-chart"></div>
    <div style="width:235px;border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden">${orderBookHTML(p.lastPrice)}</div>
  </div>`;
  setTimeout(()=>injectChart(selected.s),100);
}

// ═══════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(!app)return;
  if(selected){
    const p=prices[selected.s]||{};
    app.innerHTML=`${headerHTML()}<div id="detail-view" style="flex:1;overflow:hidden;display:flex;flex-direction:column">${detailHeaderHTML(selected,p)}<div style="flex:1;display:flex;overflow:hidden"><div style="flex:1;overflow:hidden" id="tv-chart"></div><div style="width:235px;border-left:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;overflow:hidden">${orderBookHTML(p.lastPrice)}</div></div></div>`;
    setTimeout(()=>injectChart(selected.s),100);
  } else {
    app.innerHTML=`${headerHTML()}${tabBarHTML()}<div style="flex:1;overflow:hidden;display:flex;flex-direction:column">${tab==='trading'?tradingListHTML():questionsHTML()}</div>`;
    const s=document.getElementById('srch');
    if(s&&search){s.focus();s.setSelectionRange(s.value.length,s.value.length);}
    const ci=document.getElementById('chat-in');
    if(ci&&chatInput){ci.value=chatInput;ci.style.height='auto';ci.style.height=Math.min(ci.scrollHeight,100)+'px';}
    const cbox=document.getElementById('chat-box');
    if(cbox)cbox.scrollTop=cbox.scrollHeight;
  }
  renderFloating();
}

// ═══════════════════════════════════════════════════════════════════
// GLOBAL ACTIONS
// ═══════════════════════════════════════════════════════════════════
window.selectCoin=sym=>{selected=COINS.find(c=>c.s===sym);loadBook(sym);render();};
window.closeCoin=()=>{selected=null;clearInterval(bookIv);book={bids:[],asks:[]};render();};
window.setSort=s=>{sort=s;render();};
window.setSearch=v=>{search=v;render();};
window.setTab=t=>{tab=t;render();};
window.setBotOpen=v=>{botOpen=v;renderFloating();};
window.clearBot=()=>{botMsgs=[{role:'bot',text:"🤖 BNex Analyzer ready! Ask me anything about the live market."}];renderFloating();};
window.sendChat=sendChat;
window.quickChat=txt=>{chatInput=txt;sendChat();};
window.sendBotAnalysis=txt=>{sendBotAnalysis(txt);};
window.openBotAnalyze=sym=>{botOpen=true;render();setTimeout(()=>analyzeCoin(sym),100);};

render();
</script>
</body>
</html>
