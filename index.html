<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, My Love 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a0a0f;--surface:#2d1018;--card:#3a1520;
  --rose:#e8748a;--gold:#d4a853;--pink:#f5c0cc;
  --text:#f5e6ea;--muted:#a07080;--modal-bg:rgba(10,2,5,.94);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;min-height:100vh;overflow-x:hidden;}

/* ══ INTRO ══ */
#intro{
  position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 50% 40%,#200610 0%,#0a0208 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;user-select:none;
}
#intro.fade-out{animation:introOut .9s ease forwards;}
@keyframes introOut{to{opacity:0;pointer-events:none;}}

/* petals */
.petal{position:absolute;pointer-events:none;animation:petalDrift var(--d) ease-in-out infinite var(--delay);}
@keyframes petalDrift{
  0%{transform:translateY(110vh) rotate(0deg);opacity:0;}
  10%{opacity:.7;}90%{opacity:.3;}
  100%{transform:translateY(-10vh) rotate(720deg);opacity:0;}
}

/* photo */
.intro-photo-wrap{position:relative;width:min(260px,68vw);flex-shrink:0;}
.intro-photo-wrap img{
  width:100%;display:block;
  filter:brightness(1.08) contrast(1.05) saturate(1.12);
  border-radius:50%;
  animation:photoIn 1.2s cubic-bezier(.22,1,.36,1) forwards;opacity:0;
}
@keyframes photoIn{0%{opacity:0;transform:scale(.82) translateY(18px);}100%{opacity:1;transform:scale(1) translateY(0);}}

.intro-glow{position:absolute;inset:-24px;border-radius:50%;background:radial-gradient(circle,rgba(232,116,138,.2) 0%,transparent 70%);animation:glowPulse 3s ease-in-out infinite;z-index:-1;}
@keyframes glowPulse{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.08);opacity:1;}}

.intro-ring{position:absolute;inset:-16px;border-radius:50%;border:1px solid rgba(212,168,83,.35);animation:ringSpin 8s linear infinite;}
.intro-ring::after{content:'';position:absolute;top:-5px;left:50%;width:10px;height:10px;margin-left:-5px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold);}
@keyframes ringSpin{to{transform:rotate(360deg);}}

/* message */
.intro-message{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;
  font-size:clamp(1.1rem,4.5vw,1.6rem);color:var(--pink);text-align:center;
  padding:0 28px;line-height:1.75;margin-top:28px;
  opacity:0;animation:msgIn .9s ease forwards;animation-delay:1.5s;
  max-width:460px;letter-spacing:.02em;
}
@keyframes msgIn{0%{opacity:0;transform:translateY(16px);}100%{opacity:1;transform:translateY(0);}}
.intro-message em{font-style:normal;background:linear-gradient(135deg,var(--rose),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

.intro-tap{margin-top:24px;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);opacity:0;animation:msgIn .7s ease forwards;animation-delay:3.2s;}

/* hearts canvas */
#hearts-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:.28;}

/* ══ HEADER ══ */
.site-header{position:relative;z-index:10;text-align:center;padding:52px 20px 26px;background:linear-gradient(180deg,rgba(232,116,138,.12) 0%,transparent 100%);border-bottom:1px solid rgba(212,168,83,.14);}
.site-header .eyebrow{font-size:.7rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
.site-header h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,6vw,3.6rem);font-weight:700;background:linear-gradient(135deg,var(--rose) 0%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.15;margin-bottom:10px;}
.site-header p{color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;}

/* ══ TIERED NAV ══ */
.nav-shell{position:sticky;top:0;z-index:20;background:rgba(26,10,15,.93);backdrop-filter:blur(14px);border-bottom:1px solid rgba(232,116,138,.1);padding:0 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:56px;}
#nav-tier1{display:flex;gap:0;padding:0;transition:opacity .3s;}
#nav-tier1.hidden{opacity:0;pointer-events:none;}
.main-btn{padding:0;border:none;background:transparent;cursor:pointer;}
.main-btn:hover,.main-btn.active{background:linear-gradient(135deg,var(--rose),#b84060);border-color:transparent;color:#fff;box-shadow:0 4px 22px rgba(232,116,138,.35);}
#nav-tier2{display:none;width:100%;opacity:0;transition:opacity .3s;}
#nav-tier2.visible{display:block;opacity:1;}
.tier2-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px;margin:0 auto;padding:28px 22px 60px;}
.back-btn{display:block;margin:18px auto 4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;transition:color .2s;}
.back-btn:hover{color:var(--rose);}
.section-wrap{position:relative;z-index:5;max-width:1400px;margin:0 auto;padding:24px 22px 8px;}
.section-back-btn{background:none;border:1px solid rgba(232,116,138,.32);color:var(--rose);cursor:pointer;font-size:.74rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 18px;border-radius:20px;transition:all .22s;margin-bottom:18px;display:inline-flex;align-items:center;gap:6px;}
.section-back-btn:hover{background:rgba(232,116,138,.1);border-color:var(--rose);}
.section-cat-title{font-family:'Playfair Display',serif;font-size:1.45rem;color:var(--pink);margin-bottom:4px;line-height:1.25;}
.section-cat-sub{font-size:.7rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;}
.cat-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px 20px;border-radius:20px;border:1.5px solid rgba(212,168,83,.28);background:rgba(58,21,32,.55);color:var(--pink);font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;letter-spacing:.03em;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);opacity:0;transform:translateY(-16px) scale(.94);animation:catIn .5s cubic-bezier(.22,1,.36,1) forwards;position:relative;overflow:hidden;backdrop-filter:blur(8px);width:100%;}
.cat-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,168,83,.12),rgba(232,116,138,.07));opacity:0;transition:opacity .3s;}
.cat-btn:hover::before,.cat-btn.active::before{opacity:1;}
.cat-btn:hover,.cat-btn:focus{border-color:var(--gold);box-shadow:0 14px 40px rgba(212,168,83,.22),0 0 0 1px rgba(212,168,83,.12);transform:translateY(-3px) scale(1.02);outline:none;}
.cat-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,83,.1);box-shadow:0 8px 30px rgba(212,168,83,.18);}
.cat-btn:nth-child(2){animation-delay:.07s;}.cat-btn:nth-child(3){animation-delay:.14s;}.cat-btn:nth-child(4){animation-delay:.21s;}.cat-btn:nth-child(5){animation-delay:.28s;}
@keyframes catIn{to{opacity:1;transform:translateY(0) scale(1);}}

/* ══ LANDING ══ */
#landing-prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:28px;padding:40px 24px;position:relative;z-index:5;}
.landing-icon{font-size:4rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.landing-prompt-text{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--muted);font-style:italic;text-align:center;margin-bottom:8px;}
.big-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;width:100%;max-width:600px;}
.big-choice-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:36px 20px;border-radius:24px;border:1.5px solid rgba(232,116,138,.28);background:rgba(58,21,32,.55);color:var(--pink);font-family:'Lato',sans-serif;font-size:1rem;letter-spacing:.04em;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);position:relative;overflow:hidden;backdrop-filter:blur(8px);}
.big-choice-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,116,138,.15),rgba(212,168,83,.08));opacity:0;transition:opacity .3s;}
.big-choice-btn:hover::before,.big-choice-btn:focus::before{opacity:1;}
.big-choice-btn:hover,.big-choice-btn:focus{border-color:var(--rose);box-shadow:0 16px 48px rgba(232,116,138,.28),0 0 0 1px rgba(232,116,138,.15);transform:translateY(-4px) scale(1.02);outline:none;}
.big-choice-emoji{font-size:3.4rem;line-height:1;}
.big-choice-label{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--pink);}
.big-choice-sub{font-size:.72rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:-6px;}

/* ══ GRID ══ */
.cards-section{display:none;}.cards-section.visible{display:block;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;padding:26px 22px 70px;position:relative;z-index:5;max-width:1400px;margin:0 auto;}

/* letter card */
.letter-card{background:var(--card);border:1px solid rgba(232,116,138,.18);border-radius:16px;padding:26px 22px;cursor:pointer;transition:transform .3s,box-shadow .3s,border-color .3s;position:relative;overflow:hidden;}
.letter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold));opacity:0;transition:opacity .3s;}
.letter-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(232,116,138,.18);border-color:rgba(232,116,138,.42);}
.letter-card:hover::before{opacity:1;}
.card-number{font-size:.67rem;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--pink);margin-bottom:10px;line-height:1.3;}
.card-preview{font-size:.81rem;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-tag{display:inline-block;margin-top:13px;padding:3px 10px;border-radius:10px;font-size:.67rem;border:1px solid rgba(212,168,83,.26);color:var(--gold);}

/* meme card */
.meme-card{background:var(--card);border:1px solid rgba(232,116,138,.18);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .3s,box-shadow .3s;}
.meme-card:hover{transform:translateY(-6px);box-shadow:0 20px 50px rgba(232,116,138,.22);}
.meme-emoji-box{background:linear-gradient(135deg,#3a1520,#2d1018);display:flex;align-items:center;justify-content:center;font-size:5rem;height:156px;border-bottom:1px solid rgba(232,116,138,.1);position:relative;}
.meme-top,.meme-bottom{position:absolute;left:0;right:0;text-align:center;font-family:'Lato',sans-serif;font-weight:700;font-size:.8rem;text-transform:uppercase;color:#fff;padding:0 10px;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;letter-spacing:.04em;}
.meme-top{top:9px;}.meme-bottom{bottom:9px;}
.meme-body{padding:15px 17px;}
.meme-caption{font-size:.81rem;color:var(--muted);line-height:1.5;font-style:italic;}
.meme-tag{display:inline-block;margin-top:10px;padding:3px 10px;border-radius:10px;font-size:.67rem;border:1px solid rgba(232,116,138,.26);color:var(--rose);}

/* ══ MODAL ══ */
#modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-bg);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid rgba(232,116,138,.28);border-radius:20px;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;padding:38px 34px;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.75);animation:modalIn .35s cubic-bezier(.22,1,.36,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.88) translateY(18px);}to{opacity:1;transform:scale(1) translateY(0);}}
.modal-close{position:absolute;top:15px;right:15px;background:none;border:none;color:var(--muted);font-size:1.25rem;cursor:pointer;transition:color .2s;}
.modal-close:hover{color:var(--rose);}
.modal-eyebrow{font-size:.67rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--pink);margin-bottom:18px;line-height:1.3;}
.modal-divider{height:1px;background:linear-gradient(90deg,transparent,var(--rose),transparent);margin-bottom:20px;}
.modal-content{font-size:.93rem;line-height:1.9;color:var(--text);white-space:pre-wrap;}
.modal-footer{margin-top:22px;text-align:right;font-family:'Playfair Display',serif;font-style:italic;color:var(--rose);font-size:.87rem;}
.meme-modal-emoji{font-size:5.5rem;text-align:center;margin-bottom:12px;}
.meme-modal-top{font-weight:700;font-size:.9rem;text-transform:uppercase;color:var(--gold);letter-spacing:.06em;text-align:center;margin-bottom:5px;}
.meme-modal-bottom{font-weight:700;font-size:.9rem;text-transform:uppercase;color:var(--rose);letter-spacing:.06em;text-align:center;margin-bottom:18px;}
.meme-modal-caption{font-size:.88rem;color:var(--muted);line-height:1.7;font-style:italic;text-align:center;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--surface);border-radius:3px;}
</style>
</head>

<script>
/* ── DATA ── */
var letters = [{"id": 1, "cat": "sweet", "tag": "Sweet & Tender", "title": "Good Morning, My Sunshine", "body": "Good morning, my love.\n\nBefore I even touched my phone, I thought of you. That's how deeply you've rooted yourself into my every waking moment. You are the first thought that greets me before the chaos of the day begins — soft, warm, and entirely mine.\n\nI hope today treats you gently. I hope it gives you as much joy as your voice gives me. I love you beyond what any morning can hold."}, {"id": 2, "cat": "sweet", "tag": "Sweet & Tender", "title": "You Make Everything Better", "body": "My love,\n\nI noticed something strange — since you came into my life, even ordinary things became extraordinary. Rain sounds better. Food tastes richer. Mondays feel softer. I didn't realise how grey my world was until you coloured it.\n\nThank you for being the reason I smile at random moments throughout the day. People probably think I'm weird. I don't care. I have you."}, {"id": 3, "cat": "sweet", "tag": "Sweet & Tender", "title": "I See You", "body": "Darling,\n\nI see you — not just the version of you that laughs easily and shines in conversation, but the one who gets quiet when she's overwhelmed, who overthinks at 2am, who carries more than she lets on.\n\nI see all of it. And I love every single version of you — the glowing one and the struggling one, especially the struggling one. You are not too much. You are exactly enough."}, {"id": 4, "cat": "sweet", "tag": "Sweet & Tender", "title": "My Favourite Sound", "body": "My heart,\n\nDo you know what my favourite sound is? It's your laugh. Not the polished, public one — I mean the one that escapes when something genuinely catches you off guard. The uncontrollable, throw-your-head-back one.\n\nI would build a whole life just to keep hearing it. Please never stop laughing."}, {"id": 5, "cat": "sweet", "tag": "Sweet & Tender", "title": "The Feeling I Choose Daily", "body": "My love,\n\nPeople say love is a feeling. But I think love is a decision you make fresh every morning. And every morning, without hesitation, I choose you. I choose your flaws, your fears, your dreams, your weird food habits — all of it.\n\nIt is the easiest choice I have ever made."}, {"id": 6, "cat": "sweet", "tag": "Sweet & Tender", "title": "Everything Reminds Me of You", "body": "Sweetheart,\n\nA song came on today that you'd like. I thought of you. I walked past a flower shop — I thought of you. Someone laughed from across the street — still you.\n\nYou have become the lens through which I experience the world. Everything passes through you first. I wouldn't have it any other way."}, {"id": 7, "cat": "sweet", "tag": "Sweet & Tender", "title": "You Are Safe With Me", "body": "My darling,\n\nI want you to know — whatever is weighing on you, you don't have to carry it alone. My arms may be far away right now, but my heart is pressed right against yours.\n\nTell me everything. The big things, the small things, the embarrassing things. I am not going anywhere. You are safe with me. Always."}, {"id": 8, "cat": "sweet", "tag": "Sweet & Tender", "title": "The World Is Better With You In It", "body": "Beautiful,\n\nI sometimes sit and think about how different the world is simply because you exist in it. The people who know you — how lucky they are. And the luckiest one of all is me, because I get to call you mine.\n\nThe world is a warmer, funnier, more beautiful place because of you. Don't ever forget that."}, {"id": 9, "cat": "sweet", "tag": "Sweet & Tender", "title": "I Am Proud of You", "body": "My love,\n\nI know things have been hard. I know the tasks pile up and the days blur together. But I want to pause and say this clearly:\n\nI am SO proud of you. For still showing up. For still trying. For still being you even when it's exhausting. You are not behind — you are fighting, and that is everything."}, {"id": 10, "cat": "sweet", "tag": "Sweet & Tender", "title": "Home Is a Person", "body": "Darling,\n\nI used to think home was a place. Four walls, a familiar smell, a certain kind of light through the curtains.\n\nThen I met you and I understood — home is a feeling. And whenever you speak to me, wherever I am, I feel it. You are my home. Distance cannot change that."}, {"id": 11, "cat": "sweet", "tag": "Sweet & Tender", "title": "I Notice the Little Things", "body": "My heart,\n\nI notice how you get excited when you talk about things you love. How you add \"just saying\" after being completely right about something. How you apologise even when it isn't your fault.\n\nI notice all of it. And I hold each small detail like a treasure. You are endlessly fascinating to me."}, {"id": 12, "cat": "sweet", "tag": "Sweet & Tender", "title": "Thank You for Existing", "body": "Sweetheart,\n\nSome days I just want to say thank you. Not for anything specific — just for existing. For being the person you are. For your warmth, your honesty, your ridiculous sense of humour.\n\nThe universe did something wonderful when it made you. I'm grateful every day that it put you in my direction."}, {"id": 13, "cat": "sweet", "tag": "Sweet & Tender", "title": "You Are Not Alone in This", "body": "My love,\n\nWhenever you feel overwhelmed, please close your eyes and feel me sitting right beside you. I am with you in spirit in every hard moment.\n\nYou are not fighting alone. You have never been alone. I am here — cheering loudly, loving fiercely, rooting for you always."}, {"id": 14, "cat": "sweet", "tag": "Sweet & Tender", "title": "The Way You Care", "body": "Beautiful,\n\nThe way you care for the people in your life is one of the things I love most about you. You give so generously, so quietly, expecting nothing back.\n\nI see it. I hope you let someone care for you in return — let me be that person. You deserve to receive what you so freely give."}, {"id": 15, "cat": "sweet", "tag": "Sweet & Tender", "title": "Forever is Not Long Enough", "body": "My darling,\n\nPeople throw the word \"forever\" around like it's a lifetime. But when I think about you, forever feels too short. I want more than one lifetime of laughing with you, more than one universe of loving you.\n\nYou are the argument for eternity. I love you more than time can hold."}, {"id": 16, "cat": "sweet", "tag": "Sweet & Tender", "title": "The First Thought", "body": "My love,\n\nHere is a confession — my first thought every morning is not coffee or emails or the long list of things I have to do. It's you.\n\nYour name floats up before I'm even fully awake, like my mind already knows the most important thing before the day begins. That thing is you. It's always you."}, {"id": 17, "cat": "sweet", "tag": "Sweet & Tender", "title": "I Would Find You in Every Life", "body": "Darling,\n\nIf there are other lives — if the soul gets to try again — I hope mine finds yours every single time. Not just once. Every time.\n\nHowever long it takes, however many tries, I would search every crowd, every city, every version of this world until I found you again. You are that kind of rare."}, {"id": 18, "cat": "sweet", "tag": "Sweet & Tender", "title": "You Rest Here", "body": "My heart,\n\nWhen the world is too loud and everything feels like too much, I want you to know: you can rest here. In us. In what we have.\n\nYou don't have to perform or pretend or hold it together with me. Just be. That is enough. You are more than enough. Come rest."}, {"id": 19, "cat": "sweet", "tag": "Sweet & Tender", "title": "Growing Together", "body": "My love,\n\nI love watching you become who you're meant to be. Every new discovery you make about yourself, every boundary you set, every dream you lean into — I watch it all with so much joy.\n\nI am not just in love with who you are. I am in love with who you are becoming. The best is still ahead."}, {"id": 20, "cat": "sweet", "tag": "Sweet & Tender", "title": "My Favourite Chapter", "body": "Sweetheart,\n\nIf my life were a book, you would be the chapter I reread. The one I underline and fold the corners on. The one that made me stop and say, \"Yes. This is the good part.\"\n\nYou are the good part. You have always been the good part."}, {"id": 21, "cat": "funny", "tag": "Funny & Silly", "title": "A Formal Complaint About You", "body": "Dear You,\n\nI am writing to formally complain that you have taken up permanent residence in my brain without paying rent. Thoughts of you interrupt important activities like eating, sleeping, working, and watching TV.\n\nFurthermore, you have made me smile at my phone like a fool in public on multiple occasions, causing embarrassment to myself and confusion to strangers.\n\nI demand compensation. Preferably in hugs.\n\nYours (very reluctantly),\nYour Boyfriend"}, {"id": 22, "cat": "funny", "tag": "Funny & Silly", "title": "You Are My Biggest Problem", "body": "My love,\n\nYou are the reason I'm unproductive. Every time I'm supposed to be doing something important, my brain goes: \"But have you thought about her today?\" And then 45 minutes disappear.\n\nScientists have not found a cure. I have filed a complaint with my brain. It ignored me. I blame you entirely. I love you. Please continue."}, {"id": 23, "cat": "funny", "tag": "Funny & Silly", "title": "Terms and Conditions of Loving Me", "body": "Before we proceed, please note the following Terms & Conditions:\n\n1. I will steal your blanket.\n2. I reserve the right to be annoying at random.\n3. I will say \"I'm not hungry\" and then eat all your food.\n4. I will replay your voice notes at 3am and smile like a weirdo.\n5. I will deny all of the above.\n\nBy continuing to love me, you agree to these terms. Thank you for your cooperation."}, {"id": 24, "cat": "funny", "tag": "Funny & Silly", "title": "An Investigation Into Why I Like You", "body": "I have conducted a thorough investigation (duration: 3 minutes) into why I like you. The findings are as follows:\n\n• You're funny: Confirmed\n• You're beautiful: Dangerously so\n• You \"get\" me: Suspicious, but appreciated\n• You make me happy: Inconclusive (too much evidence)\n\nConclusion: I am completely whipped and fully at peace with this. End of report."}, {"id": 25, "cat": "funny", "tag": "Funny & Silly", "title": "You Are Basically a Bug in My Code", "body": "My love,\n\nFrom a technical standpoint, you are a bug in my daily routine. Every plan I make gets interrupted by thoughts of you. Every to-do list includes \"tell her something nice.\"\n\nI've tried to patch the issue. It doesn't work. Apparently you're not a bug — you're a feature. The most important one. I'm keeping you."}, {"id": 26, "cat": "funny", "tag": "Funny & Silly", "title": "My Honest Review: 5 Stars", "body": "★★★★★ (5/5)\n\nProduct: My Girlfriend\n\nPros: Funny, beautiful, smart, caring, makes me laugh uncontrollably.\nCons: Lives too far away, makes me feel feelings I can't explain, causes random smiling.\n\nOverall: Highly recommended. Would fall in love again. 10/10 best decision of my life. Shipping time could improve (please visit sooner)."}, {"id": 27, "cat": "funny", "tag": "Funny & Silly", "title": "You Ruined Other People For Me", "body": "My darling,\n\nI want you to know you've done something very inconsiderate: you've ruined other people for me. Now when I meet anyone, my brain automatically compares them to you and they all lose immediately.\n\n\"Are they as funny? No. As kind? No. As ridiculously attractive? Absolutely not.\" You have set an unreasonable standard and I am living with the consequences. Thank you."}, {"id": 28, "cat": "funny", "tag": "Funny & Silly", "title": "My Heart Wrote This", "body": "My Brain says: \"This is not rational. You barely get enough sleep. You spend too much time thinking about her.\"\n\nMy Heart says: \"SHE SAID GOOD MORNING AND I HAVEN'T RECOVERED.\"\n\nThis letter is written by my heart. My brain is sulking in the corner. It knows it lost. You win. You always win. Congratulations."}, {"id": 29, "cat": "funny", "tag": "Funny & Silly", "title": "Things I Would Do For You", "body": "A partial list of things I would do for you:\n\n• Watch that show you like (even the slow episodes)\n• Sit through a 3-hour shopping session without one complaint\n• Eat vegetables without making a face\n• Learn how to properly fold laundry (key word: try)\n• Travel across the country\n• Embarrass myself publicly\n• Anything. Genuinely. Anything.\n\nThis list is ongoing. Please advise."}, {"id": 30, "cat": "funny", "tag": "Funny & Silly", "title": "Your Laugh Is a Problem", "body": "My love,\n\nYour laugh should be classified as a dangerous weapon. I am not exaggerating. When you laugh that specific laugh — the uncontrollable one — I completely forget what I was doing.\n\nI've tried to develop immunity. I have failed. I have accepted this. You are the only person whose laugh makes me laugh for no reason. It's very annoying. I love it."}, {"id": 31, "cat": "funny", "tag": "Funny & Silly", "title": "Why I'm Late to Everything Now", "body": "Official Statement:\n\nI would like to address why I have been late to various obligations recently. The reason is simple: I was talking to you and I lost track of time.\n\nFurther investigation reveals this has happened 37 times in the past month. I do not regret any of them. I apologise to productivity. I do not apologise to you."}, {"id": 32, "cat": "funny", "tag": "Funny & Silly", "title": "The Essay Deleter", "body": "I see you. The three dots appear... then disappear... then reappear. I know you're typing a whole essay and then deleting it.\n\nFor the record: I do the same thing. We are both chaotic. We are perfect for each other. Please stop deleting the essays — I want to read all of them."}, {"id": 33, "cat": "funny", "tag": "Funny & Silly", "title": "You Are Not a Red Flag", "body": "My love, I want to reassure you: you are not a red flag. You are possibly a whole bouquet of pink flags at most — like leaving me on read for 20 minutes and then sending a meme as an apology.\n\nBut I would accept 1000 meme apologies. I am fully domesticated. There is no going back. I love you, flag and all."}, {"id": 34, "cat": "funny", "tag": "Funny & Silly", "title": "A Note on Your Voice", "body": "Dear Science,\n\nPlease explain why her voice makes my entire mood shift in 10 seconds. I was having a perfectly average day and then she said my name and suddenly I have the energy of someone who just won a prize.\n\nThis is chemically suspicious and I demand answers.\n\nSincerely,\nSomeone Very Confused and Very Happy"}, {"id": 35, "cat": "funny", "tag": "Funny & Silly", "title": "My Villain Arc Was Ruined By You", "body": "I was ready to be focused, emotionless, and absolutely productive this year.\n\nThen you texted \"morning 🌸\" and my villain arc collapsed entirely. My cold exterior melted. My plans for world productivity were abandoned.\n\nI hope you're proud of yourself. I'm smiling. This is your fault."}, {"id": 36, "cat": "funny", "tag": "Funny & Silly", "title": "You Are Worse Than Wifi", "body": "My darling,\n\nWifi disconnects and I barely notice. You go quiet for a few hours and I'm checking my phone every seven minutes.\n\nI have become entirely dependent on you for emotional bandwidth. My signal is strongest when you're around. Please don't disconnect. Terms and Conditions: unlimited data, no roaming charges."}, {"id": 37, "cat": "funny", "tag": "Funny & Silly", "title": "Let's Be Weird Together", "body": "Formal proposal from my brain to yours:\n\nLet's be weird together. Let's have ridiculous inside jokes that confuse everyone else. Let's laugh at things that aren't even funny just because we're together.\n\nLet's build a relationship so oddly specific and perfectly ours that no one else could replicate it even if they tried. All in favour? I assume yes."}, {"id": 38, "cat": "funny", "tag": "Funny & Silly", "title": "Warning Label", "body": "WARNING: This person (me) may cause the following side effects when in love with you:\n\n— Random uncontrollable smiling\n— Sending songs at 2am with no context\n— Becoming weirdly competitive in games just to impress you\n— Mentioning you in every unrelated conversation\n— General happiness\n\nSide effects are permanent. No refunds. I love you."}, {"id": 39, "cat": "funny", "tag": "Funny & Silly", "title": "Your Timing Is Terrible", "body": "My love,\n\nYou have perfect timing. You texted me right when I was trying to be productive. You said something sweet right as I was trying to go to sleep. You made me laugh right as I was trying to be serious.\n\nYour timing is terrible. Your timing is my favourite thing. Thank you for disrupting everything. Long may it continue."}, {"id": 40, "cat": "funny", "tag": "Funny & Silly", "title": "Final Decision: Keeping You", "body": "After thorough consideration, I have decided:\n\nYou are annoying in the best way. You make everything complicated and wonderful. You occupy space in my head that should probably be used for something useful.\n\nFinal decision: keeping you. No appeals. No negotiation. You're stuck with me. I love you. Deal with it."}, {"id": 41, "cat": "poetic", "tag": "Deep & Poetic", "title": "What the Stars Know", "body": "My love,\n\nThe stars have seen everything — every civilisation that rose and fell, every love that burned bright and was extinguished. But tonight, they watch us too. A girl across the miles with too much on her plate, and a boy who is hopelessly, permanently, cosmically in love with her.\n\nI think even the stars root for us."}, {"id": 42, "cat": "poetic", "tag": "Deep & Poetic", "title": "Before You, After You", "body": "There is a before you and an after you in my life. They are different worlds.\n\nBefore you: I moved through days like I was reading a book I didn't particularly care about. After you: every page matters. Every sentence has weight. I am invested in how this story ends.\n\nYou changed the narrative. I am grateful every day."}, {"id": 43, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Gravity of You", "body": "My darling,\n\nGravity is not the strongest force in the universe. Physicists think it is, but they haven't felt the pull of a person who rewrites how you understand everything.\n\nYou are my gravity. You are what I orbit. Everything else bends around you."}, {"id": 44, "cat": "poetic", "tag": "Deep & Poetic", "title": "On Quiet Days", "body": "On the quiet days — the grey ones, the slow ones — I think about the texture of who you are. The way your mind works. The specific way you see the world that nobody else has.\n\nI could spend a lifetime studying you and still find new angles to love. You are infinite to me."}, {"id": 45, "cat": "poetic", "tag": "Deep & Poetic", "title": "You Are Not an Afterthought", "body": "My love,\n\nIn a world that sometimes makes you feel small — that hands you endless tasks and measures your worth by output — I want to say something true:\n\nYou are not an afterthought. You are not just someone who gets things done. You are a whole, complex, brilliant universe of a person. And I am in awe of you."}, {"id": 46, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Language Between Us", "body": "We have built our own language — a private shorthand of jokes, references, silences. The way I know what your \"hm\" means. The way you know exactly what I meant even when I said it wrong.\n\nLanguage is a miracle. But the language between two people who truly know each other — that is a rarer miracle still. I am fluent in you."}, {"id": 47, "cat": "poetic", "tag": "Deep & Poetic", "title": "What Love Actually Is", "body": "I used to think love was grand gestures. Now I know better.\n\nLove is remembering how you take your tea. It's thinking \"she would love this\" before I even finish the thought. It's your absence being louder than most people's presence.\n\nThat's what love is. You are what love is."}, {"id": 48, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Version of Me You Bring Out", "body": "My darling,\n\nThere is a version of me that only exists around you. Softer. More honest. More willing to be seen.\n\nI don't know if you realise the gift you've given me — permission to just be. Unguarded. Real. You did that without trying. That is a rare and beautiful power."}, {"id": 49, "cat": "poetic", "tag": "Deep & Poetic", "title": "You Deserve Softness", "body": "My love,\n\nThe world asks so much of you. It piles things onto the strong ones because they can carry it. But strength does not mean you should have to.\n\nYou deserve softness. You deserve rest. You deserve someone whose entire mission is to make your life lighter. Let me be that. That is all I want."}, {"id": 50, "cat": "poetic", "tag": "Deep & Poetic", "title": "In Every Crowd", "body": "In every crowded room, in every busy street, if you were there — I would find you. Not because you're loud or obvious, but because something in me is tuned to your frequency.\n\nYou are the signal I'm always listening for."}, {"id": 51, "cat": "poetic", "tag": "Deep & Poetic", "title": "Things Too Large for Words", "body": "Some feelings are too large for words. They live in the chest like light through a window — shapeless but undeniable.\n\nThat is how I feel about you most days. Something so warm and enormous that language falls short. But know this: whatever the feeling is that I cannot name — it is entirely yours."}, {"id": 52, "cat": "poetic", "tag": "Deep & Poetic", "title": "On Missing Someone You Have", "body": "There is a particular kind of longing for someone you have but cannot reach. It is not grief — it's softer. A kind of ache that reminds you the thing you love is real.\n\nI miss you like that. Constantly, quietly, and with gratitude — because missing you means I have something worth missing."}, {"id": 53, "cat": "poetic", "tag": "Deep & Poetic", "title": "Time Is Different With You", "body": "Time behaves strangely around you. Hours collapse to minutes. A single conversation expands into a whole world.\n\nI don't know if that is physics or love. I suspect it is both. I suspect they might be the same thing."}, {"id": 54, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Map of You", "body": "I have learned the map of you — the places where you're tender, the borders where you're brave, the deep interior that most people never see.\n\nI carry that map everywhere. It is the most precious thing I own. I will spend my whole life exploring, and I don't expect to reach the edge of you."}, {"id": 55, "cat": "poetic", "tag": "Deep & Poetic", "title": "Witnessing You", "body": "I think one of the deepest acts of love is simply to witness someone. To pay attention. To say: I see you. Your struggle, your growth, your quiet victories that no one else notices.\n\nI am your witness. I see every version of you. And every version is worthy of love."}, {"id": 56, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Architecture of Us", "body": "What we have built together is remarkable — not from grand materials but from ordinary ones. Late-night messages. Silly voice notes. Shared silence. Laughter that comes from nowhere.\n\nIt is the architecture of two people choosing each other, day by day. I am proud of what we've built. I am proud of us."}, {"id": 57, "cat": "poetic", "tag": "Deep & Poetic", "title": "On Ordinary Love", "body": "Poets write about the extraordinary moments of love. But I want to write about the ordinary ones.\n\nThe way we talk about nothing for hours. The way I save things to tell you. The way your name in my notifications shifts something in my chest.\n\nThe ordinary moments are everything. The ordinary moments are the love."}, {"id": 58, "cat": "poetic", "tag": "Deep & Poetic", "title": "What I Want For You", "body": "More than my love, I want you to have peace. I want you to wake up on days when the world feels possible. I want you to feel proud of yourself the way I am proud of you.\n\nI want you to know your own worth without needing anyone — including me — to confirm it. And then I want you to let me love you anyway."}, {"id": 59, "cat": "poetic", "tag": "Deep & Poetic", "title": "You Changed What I Pray For", "body": "Before you, I prayed for outcomes. Good days. Success. Progress.\n\nNow I pray for you too — for your peace, your health, your joy. You have become part of my deepest hopes.\n\nThat is how I know this is real. It is real when you start wishing for someone else as hard as you wish for yourself."}, {"id": 60, "cat": "poetic", "tag": "Deep & Poetic", "title": "The Feeling That Has No Name", "body": "Philosophers named everything they could. There's a word in Portuguese for longing, in Japanese for the beauty of things that fade, in German for the joy of others' happiness.\n\nBut no one has named the exact feeling of realising, quietly, that this specific person has become your favourite part of being alive. That feeling is you. It doesn't need a name. It just needs to be felt."}, {"id": 61, "cat": "longdistance", "tag": "Long Distance", "title": "Same Sky", "body": "My love,\n\nI looked up at the sky tonight and thought about you looking at the same one. Different coordinates, same stars. Same moon hanging between us like a shared secret.\n\nThe distance is real. But so is this. And this is bigger."}, {"id": 62, "cat": "longdistance", "tag": "Long Distance", "title": "What the Miles Cannot Do", "body": "The miles can keep us in different cities. They cannot keep me from thinking of you every hour. They cannot stop your voice from being the thing I need after a long day. They cannot change the fact that you are mine and I am yours.\n\nDistance is geography. What we have is not geography. It is bigger than location."}, {"id": 63, "cat": "longdistance", "tag": "Long Distance", "title": "The Countdown", "body": "My darling,\n\nEvery day that passes is one less day between us. I measure time differently now — not in weeks but in \"closer to you.\"\n\nThe wait is hard. The wait is worth it. You are worth every single day of it."}, {"id": 64, "cat": "longdistance", "tag": "Long Distance", "title": "What I'll Do When I See You", "body": "I have a list. It is embarrassingly long.\n\nFirst: hug you and not let go for an unreasonable amount of time. Second: stare at your face and remind myself you're real. Third: probably cry a little (we don't need to discuss this). Fourth: everything else.\n\nThe day I see you will be the best day. I am already looking forward to it."}, {"id": 65, "cat": "longdistance", "tag": "Long Distance", "title": "Good Night From Here", "body": "Good night, my love.\n\nWe go to sleep in different places, under different ceilings, but with the same last thought: each other. I find that beautiful even when it's hard.\n\nSleep well. Dream of something gentle. I'll be here in the morning."}, {"id": 66, "cat": "longdistance", "tag": "Long Distance", "title": "If You Were Here", "body": "If you were here, I'd make you tea and complain about nothing important. We'd sit together and I'd show you all the things I've been saving to tell you in person.\n\nI'd probably just look at you a lot. I wouldn't even be sorry about it. Until then — these words are the closest I can get."}, {"id": 67, "cat": "longdistance", "tag": "Long Distance", "title": "Distance Is Only a Test", "body": "My love,\n\nI believe distance is just a test of what's real. Convenience is easy to love. Something you have to work for, something you choose every day despite the difficulty — that's the real thing.\n\nWe are the real thing. We have proved it over and over. I am sure of us."}, {"id": 68, "cat": "longdistance", "tag": "Long Distance", "title": "Your Voice Is a Home", "body": "Your voice does something to me that nothing else does. It lands somewhere specific — not just my ears but somewhere deeper. A place I'd describe as home if that weren't also what you feel like.\n\nEvery call. Every voice note. Every time you say my name. I collect them all."}, {"id": 69, "cat": "longdistance", "tag": "Long Distance", "title": "I Don't Love You Less", "body": "In case you ever wonder: the distance hasn't dimmed anything. If anything, it made certain things sharper — the way I miss you, the way I appreciate every conversation, the clarity of knowing exactly how much I need you in my world.\n\nDistance illuminates. And you shine impossibly bright from wherever you are."}, {"id": 70, "cat": "longdistance", "tag": "Long Distance", "title": "What I Think About on Long Days", "body": "On the long days — the ones that stretch on forever — I think about what it'll be like when the distance is finally just a memory. When \"good morning\" doesn't come through a screen. When \"I'm here\" means literally here.\n\nI hold that thought on the hard days. It gets me through. You get me through."}, {"id": 71, "cat": "longdistance", "tag": "Long Distance", "title": "Love Doesn't Need a Passport", "body": "My darling,\n\nThey can close borders. They cannot close this. Love has never needed a passport — it travels in voice notes, in 3am messages, in \"I thought you'd like this.\"\n\nWe have crossed every distance that matters already. The physical one is just logistics."}, {"id": 72, "cat": "longdistance", "tag": "Long Distance", "title": "The Geography of Missing You", "body": "Missing you has its own geography. There's the sharp kind that hits suddenly — a song, a joke you'd love. And the slow background kind that's always there, humming quietly beneath everything.\n\nBoth kinds are made of love. I carry them both with something close to gratitude."}, {"id": 73, "cat": "longdistance", "tag": "Long Distance", "title": "When the World Feels Heavy", "body": "When the world feels heavy — and I know it does sometimes — I hope you feel me in the corner of it, lightening the load even just a little.\n\nI may not be able to sit beside you. But my love is there. Solidly, stubbornly, absolutely there."}, {"id": 74, "cat": "longdistance", "tag": "Long Distance", "title": "The Best Messages", "body": "Do you know which messages mean the most to me? Not the long ones. The small ones.\n\n\"Morning.\" \"Are you okay?\" \"This reminded me of you.\" \"I miss you.\"\n\nFour words. Sometimes two. And somehow they carry the whole weight of everything we are. I save all of them."}, {"id": 75, "cat": "longdistance", "tag": "Long Distance", "title": "Patience Is an Act of Love", "body": "Nobody tells you that patience is a form of love. Not the passive kind — the active kind. The kind that says: I will wait for you. I will show up again tomorrow. The distance will not wear this down.\n\nI am patient because you are worth every day of this. I want you to know that."}, {"id": 76, "cat": "longdistance", "tag": "Long Distance", "title": "You Are With Me Anyway", "body": "You are not here and yet you are everywhere.\n\nIn the music I choose. In the way I experience things and think \"she'd love this.\" In the reflex to text you when something happens before I've told anyone else.\n\nYou live in my days, all of them, even the ones I spend alone. That's not distance. That's love."}, {"id": 77, "cat": "longdistance", "tag": "Long Distance", "title": "Building Toward Something", "body": "My love,\n\nEvery day we spend apart is a day we are building toward something. Every call, every message, every moment of \"I miss you\" is a brick laid down.\n\nWe are building something strong. The foundation is already remarkable. I cannot wait to see what we live in when it's finished."}, {"id": 78, "cat": "longdistance", "tag": "Long Distance", "title": "If I Could Send You One Thing", "body": "If I could package one thing and send it across this distance, it would not be flowers or gifts.\n\nIt would be the specific feeling of how safe you are with me. Wrapped up carefully, sealed tight, just so you'd have it on the days when you need to feel it most."}, {"id": 79, "cat": "longdistance", "tag": "Long Distance", "title": "The Day the Distance Ends", "body": "I think about that day often. The one where the miles finally collapse.\n\nI won't need grand words. I'll just need your presence — real, physical, undeniable presence. The kind no screen can replicate.\n\nUntil then, I carry you everywhere. A love story mid-chapter. The ending is going to be worth it."}, {"id": 80, "cat": "longdistance", "tag": "Long Distance", "title": "You Make Hope Feel Reasonable", "body": "Some people find hope in religion, in nature, in art. I find mine partly in you.\n\nIn the fact that something this good exists. That you exist. That two people can be this connected across this much space and still choose each other every single day.\n\nYou make hope feel reasonable. Thank you for that."}, {"id": 81, "cat": "short", "tag": "Short & Spicy", "title": "Simple Truth", "body": "I love you.\n\nThat's it. That's the whole letter. There's nothing I could add that would make it more true."}, {"id": 82, "cat": "short", "tag": "Short & Spicy", "title": "My Favourite Notification", "body": "Out of every notification my phone has ever given me, you are the favourite.\n\nBy a lot. It's not even close."}, {"id": 83, "cat": "short", "tag": "Short & Spicy", "title": "Do You Know?", "body": "Do you know how beautiful you are?\n\nNot just physically. I mean the whole thing — your mind, your laugh, the way you care. Do you know?\n\nYou should know."}, {"id": 84, "cat": "short", "tag": "Short & Spicy", "title": "The Upgrade", "body": "Before you: fine.\nAfter you: everything.\n\nYou are the best upgrade I didn't know I needed."}, {"id": 85, "cat": "short", "tag": "Short & Spicy", "title": "Just Checking", "body": "Just checking in to say:\n\nYou're amazing. You're doing better than you think. I love you. That's all. Carry on."}, {"id": 86, "cat": "short", "tag": "Short & Spicy", "title": "The Confession", "body": "Confession: I smile every time I see your name on my screen.\n\nEvery. Single. Time.\n\nI have no regrets about this."}, {"id": 87, "cat": "short", "tag": "Short & Spicy", "title": "Mathematics", "body": "You + Me = my favourite equation.\n\nNo further calculations required."}, {"id": 88, "cat": "short", "tag": "Short & Spicy", "title": "The Ranking", "body": "Ranked: things I love.\n\n1. You.\n2. Also you.\n3. Still you.\n\nThe list goes on. The results are consistent."}, {"id": 89, "cat": "short", "tag": "Short & Spicy", "title": "What You Did", "body": "You somehow made \"I'm here\" the most comforting phrase in the English language.\n\nThat's what you did to me. Are you proud of yourself? You should be."}, {"id": 90, "cat": "short", "tag": "Short & Spicy", "title": "Small Note", "body": "Small note before you go to sleep:\n\nYou are loved. Specifically, deeply, daily. Sleep well knowing that."}, {"id": 91, "cat": "short", "tag": "Short & Spicy", "title": "The Problem With You", "body": "The problem with you is that you make me want to be better.\n\nAnd I didn't even ask for that. Very inconsiderate. Thank you."}, {"id": 92, "cat": "short", "tag": "Short & Spicy", "title": "Emergency Broadcast", "body": "EMERGENCY MESSAGE:\n\nShe is remarkable. This has been a public service announcement. Thank you for your time."}, {"id": 93, "cat": "short", "tag": "Short & Spicy", "title": "Certified", "body": "Certified facts:\n\nYou are wonderful.\nI am lucky.\nThis is forever.\n\nEnd of document."}, {"id": 94, "cat": "short", "tag": "Short & Spicy", "title": "No Deep Reason", "body": "I don't love you for a deep philosophical reason.\n\nI love you because it's you. That's the entire explanation."}, {"id": 95, "cat": "short", "tag": "Short & Spicy", "title": "Plot Twist", "body": "Plot twist of my life:\n\nI was doing fine, then I met you, and fine wasn't good enough anymore."}, {"id": 96, "cat": "short", "tag": "Short & Spicy", "title": "Reminder", "body": "Reminder:\n\nYou are not too much. You are not too little. You are not too complicated.\n\nYou are just right. Exactly right."}, {"id": 97, "cat": "short", "tag": "Short & Spicy", "title": "One Sentence", "body": "If I had one sentence to describe you:\n\n\"The reason the word remarkable exists.\""}, {"id": 98, "cat": "short", "tag": "Short & Spicy", "title": "Undo Unavailable", "body": "Falling for you has no undo button.\n\nI looked. I checked. I'm stuck with loving you.\n\nI am devastated. I am delighted."}, {"id": 99, "cat": "short", "tag": "Short & Spicy", "title": "Permission Slip", "body": "Permission slip:\n\nYou are allowed to rest today. You are allowed to feel overwhelmed. You are allowed to just be.\n\nSigned: Someone who thinks you're extraordinary."}, {"id": 100, "cat": "short", "tag": "Short & Spicy", "title": "Letter 100", "body": "If you've made it all the way to letter 100, I hope you know this:\n\nEvery single one of these was written for you. All of it — every word, every joke, every poem — is a piece of how I see you.\n\nYou are loved. Deeply. Completely. Every day, without question, without condition.\n\nAlways yours."}];

var currentSection = null;
var currentCat = null;

var letterCategories = {
  'sweet': 'Sweet & Tender',
  'funny': 'Funny & Silly',
  'poetic': 'Deep & Poetic',
  'longdistance': 'Long Distance'
};

var memeCategories = {
  'couple': 'Couple Goals',
  'ldr': 'Long Distance',
  'text': 'Texting Wars',
  'weird': 'Love is Weird'
};

/* ── NAVIGATION ── */
function showSection(section) {
  currentSection = section;
  var tier1 = document.getElementById('nav-tier1');
  var tier2 = document.getElementById('nav-tier2');
  var landing = document.getElementById('landing-prompt');
  
  // Hide landing
  landing.style.display = 'none';
  
  // Build tier2 with big card category buttons
  var categories = section === 'letters' ? letterCategories : memeCategories;
  var emojis = section === 'letters'
    ? {sweet:'🌸', funny:'😄', poetic:'🌙', longdistance:'✈️'}
    : {couple:'💑', ldr:'🌍', text:'💬', weird:'🎭'};
  var subs = section === 'letters'
    ? {sweet:'Soft & warm', funny:'Laugh out loud', poetic:'Deep feelings', longdistance:'Across the miles'}
    : {couple:'Relationship gold', ldr:'The distance struggle', text:'Chat chaos', weird:'Love is strange'};

  var grid = '<button class="back-btn" onclick="goBack()">← Back</button><div class="tier2-grid">';
  Object.keys(categories).forEach(function(key) {
    grid += '<button class="cat-btn" onclick="selectCategory(\''+key+'\')">'
          + '<span style="font-size:2.2rem;line-height:1">' + emojis[key] + '</span>'
          + '<span>' + categories[key] + '</span>'
          + '<span style="font-size:.68rem;color:var(--muted);font-family:Lato,sans-serif;font-weight:400;letter-spacing:.05em;text-transform:uppercase;margin-top:-4px">' + subs[key] + '</span>'
          + '</button>';
  });
  grid += '</div>';
  tier2.innerHTML = grid;
  
  // Show tier2 with animation
  setTimeout(function() {
    tier2.classList.add('visible');
  }, 50);
}

function selectCategory(key) {
  currentCat = key;

  // Slide tier2 out then open dedicated section
  var tier2 = document.getElementById('nav-tier2');
  tier2.style.transition = 'opacity .18s';
  tier2.style.opacity   = '0';

  setTimeout(function() {
    tier2.classList.remove('visible');
    tier2.style.opacity = '';

    var isLetters  = currentSection === 'letters';
    var catLabel   = isLetters ? letterCategories[key] : memeCategories[key];
    var catEmojis  = isLetters
      ? {sweet:'🌸', funny:'😄', poetic:'🌙', longdistance:'✈️'}
      : {couple:'💑', ldr:'🌍', text:'💬', weird:'🎭'};
    var itemCount  = isLetters
      ? letters.filter(function(l){ return l.cat === key; }).length
      : memes.filter(function(m){ return m.cat === key; }).length;
    var itemWord   = isLetters ? 'letters' : 'memes';

    var headerHtml =
      '<div class="section-wrap">'
      + '<button class="section-back-btn" onclick="backToCategories()">← Back to categories</button>'
      + '<div class="section-cat-title">' + catEmojis[key] + ' ' + catLabel + '</div>'
      + '<div class="section-cat-sub">' + itemCount + ' ' + itemWord + ' for you</div>'
      + '</div>';

    if (isLetters) {
      renderLetters(key);
      var sectionEl = document.getElementById('section-letters');
      var old = sectionEl.querySelector('.section-wrap');
      if (old) sectionEl.removeChild(old);
      sectionEl.insertAdjacentHTML('afterbegin', headerHtml);
      sectionEl.classList.add('visible');
      document.getElementById('section-memes').classList.remove('visible');
    } else {
      renderMemes(key);
      var sectionEl = document.getElementById('section-memes');
      var old = sectionEl.querySelector('.section-wrap');
      if (old) sectionEl.removeChild(old);
      sectionEl.insertAdjacentHTML('afterbegin', headerHtml);
      sectionEl.classList.add('visible');
      document.getElementById('section-letters').classList.remove('visible');
    }
  }, 180);
}

function goBack() {
  currentSection = null;
  currentCat = null;
  var tier1 = document.getElementById('nav-tier1');
  var tier2 = document.getElementById('nav-tier2');
  
  tier2.classList.remove('visible');
  tier2.innerHTML = '';
  
  document.getElementById('section-letters').classList.remove('visible');
  document.getElementById('section-memes').classList.remove('visible');
  document.getElementById('landing-prompt').style.display = 'flex';
}

function backToCategories() {
  // Hide card sections
  document.getElementById('section-letters').classList.remove('visible');
  document.getElementById('section-memes').classList.remove('visible');
  currentCat = null;

  // Fade tier2 categories back in
  var tier2 = document.getElementById('nav-tier2');
  tier2.style.opacity = '0';
  tier2.classList.add('visible');
  setTimeout(function() {
    tier2.style.transition = 'opacity .22s';
    tier2.style.opacity    = '1';
    setTimeout(function() { tier2.style.transition = ''; tier2.style.opacity = ''; }, 240);
  }, 20);
}

/* ── RENDER ── */
function pad(n){ return String(n).padStart(3,'0'); }

function renderLetters(cat) {
  var data = letters.filter(function(l){ return l.cat === cat; });
  document.getElementById('letters-grid').innerHTML = data.map(function(l){
    return '<div class="letter-card" onclick="openLetter('+l.id+')">'
      + '<div class="card-number">Letter #' + pad(l.id) + '</div>'
      + '<div class="card-title">'   + esc(l.title) + '</div>'
      + '<div class="card-preview">' + esc(l.body)  + '</div>'
      + '<span class="card-tag">'    + esc(l.tag)   + '</span>'
      + '</div>';
  }).join('');
}

function renderMemes(cat) {
  var data = memes.filter(function(m){ return m.cat === cat; });
  document.getElementById('memes-grid').innerHTML = data.map(function(m){
    return '<div class="meme-card" onclick="openMeme('+m.id+')">'
      + '<div class="meme-emoji-box">'
      + '<span class="meme-top">'    + esc(m.top)    + '</span>'
      + '<span style="font-size:5rem">' + m.emoji    + '</span>'
      + '<span class="meme-bottom">' + esc(m.bottom) + '</span>'
      + '</div>'
      + '<div class="meme-body">'
      + '<div class="meme-caption">' + esc(m.caption) + '</div>'
      + '<span class="meme-tag">'    + esc(m.tag)     + '</span>'
      + '</div></div>';
  }).join('');
}

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ── MODALS ── */
function openLetter(id) {
  var l = letters.find(function(x){ return x.id === id; });
  document.getElementById('modal-box').innerHTML =
      '<button class="modal-close" onclick="closeModal()">&#x2715;</button>'
    + '<div class="modal-eyebrow">Letter #' + pad(l.id) + ' &middot; ' + esc(l.tag) + '</div>'
    + '<div class="modal-title">' + esc(l.title) + '</div>'
    + '<div class="modal-divider"></div>'
    + '<div class="modal-content">' + esc(l.body) + '</div>'
    + '<div class="modal-footer">&mdash; With all my love 💌</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

function openMeme(id) {
  var m = memes.find(function(x){ return x.id === id; });
  document.getElementById('modal-box').innerHTML =
      '<button class="modal-close" onclick="closeModal()">&#x2715;</button>'
    + '<div class="modal-eyebrow">' + esc(m.tag) + '</div>'
    + '<div class="meme-modal-emoji">' + m.emoji + '</div>'
    + '<div class="meme-modal-top">'    + esc(m.top)     + '</div>'
    + '<div class="meme-modal-bottom">' + esc(m.bottom)  + '</div>'
    + '<div class="modal-divider"></div>'
    + '<div class="meme-modal-caption">' + esc(m.caption) + '</div>';
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
document.addEventListener('keydown', function(e){ if (e.key === 'Escape') { closeModal(); } });

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('intro').addEventListener('click', skipIntro);

} else {
  document.getElementById('intro').addEventListener('click', skipIntro);

  ctx.fillStyle   = h.color;
  ctx.translate(h.x, h.y);
  var s = h.size / 30;
  ctx.scale(s, s);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-15,-15,-30,10,0,30);
  ctx.bezierCurveTo(30,10,15,-15,0,0);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function animateHearts(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (Math.random() < 0.03) { hearts.push(rh()); }
  hearts = hearts.filter(function(h){ return h.y > -50; });
  hearts.forEach(function(h){ h.y -= h.speed; h.x += h.drift; drawHeart(h); });
  requestAnimationFrame(animateHearts);
}
animateHearts();
</script>
